<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Preview</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #030712;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .phone-frame {
      width: 375px;
      height: 812px;
      border: 12px solid #374151;
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      background-color: #0b1121;
      overflow: hidden;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <iframe src="/"></iframe>
  </div>
</body>
</html>
